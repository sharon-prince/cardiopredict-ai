<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — CardioPredict AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body {
            background: linear-gradient(135deg, #0F2044 0%, #1a56db 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 420px;
        }
        .brand {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            color: #0F2044;
        }
        .brand p {
            color: #64748B;
            font-size: 14px;
            margin-top: 4px;
        }
        .form-label {
            font-weight: 600;
            font-size: 13.5px;
            color: #1E293B;
        }
        .form-control {
            border: 1.5px solid #CBD5E1;
            border-radius: 8px;
            padding: 11px 14px;
            font-size: 14px;
        }
        .form-control:focus {
            border-color: #1a56db;
            box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
        }
        .btn-login {
            background: linear-gradient(135deg, #1a56db, #0F2044);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(26,86,219,0.35);
            color: white;
        }
        .divider {
            text-align: center;
            color: #94A3B8;
            font-size: 13px;
            margin: 20px 0;
            position: relative;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #E2E8F0;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .btn-register {
            background: white;
            color: #1a56db;
            border: 2px solid #1a56db;
            border-radius: 10px;
            padding: 11px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: #EFF6FF;
            color: #1a56db;
        }
        .alert-box {
            display: none;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .alert-error {
            background: #FEE2E2;
            color: #991B1B;
            border: 1px solid #FECACA;
        }
        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #A7F3D0;
        }
    </style>
</head>
<body>
<!-- ── Navbar ── -->
<nav style="background:linear-gradient(90deg,#0F2044,#1a3a6e);
padding:0; box-shadow:0 2px 12px rgba(0,0,0,0.2);
position:sticky; top:0; z-index:999;">
    <div class="container">
        <div style="display:flex; align-items:center;
        justify-content:space-between; padding:12px 0; gap:12px;">

            <!-- Brand -->
            <a href="home.html"
            style="font-size:20px; font-weight:800; color:white;
            text-decoration:none; letter-spacing:0.3px; flex-shrink:0;">
                ❤️ CardioPredict AI
            </a>

            <!-- Module Links (hidden on mobile, shown on desktop) -->
            <div class="d-none d-md-flex align-items-center"
            style="gap:4px;">
                <a href="index.html" id="nav-risk"
                style="color:rgba(255,255,255,0.8); text-decoration:none;
                padding:7px 14px; border-radius:20px; font-size:14px;
                font-weight:500; transition:all 0.2s;"
                onmouseover="this.style.background='rgba(255,255,255,0.12)';
                this.style.color='white'"
                onmouseout="this.style.background='transparent';
                this.style.color='rgba(255,255,255,0.8)'">
                    📊 Risk Assessment
                </a>
                <a href="triage.html" id="nav-triage"
                style="color:rgba(255,255,255,0.8); text-decoration:none;
                padding:7px 14px; border-radius:20px; font-size:14px;
                font-weight:500; transition:all 0.2s;"
                onmouseover="this.style.background='rgba(255,255,255,0.12)';
                this.style.color='white'"
                onmouseout="this.style.background='transparent';
                this.style.color='rgba(255,255,255,0.8)'">
                    🩺 Symptoms
                </a>
                <a href="recommendations.html" id="nav-rec"
                style="color:rgba(255,255,255,0.8); text-decoration:none;
                padding:7px 14px; border-radius:20px; font-size:14px;
                font-weight:500; transition:all 0.2s;"
                onmouseover="this.style.background='rgba(255,255,255,0.12)';
                this.style.color='white'"
                onmouseout="this.style.background='transparent';
                this.style.color='rgba(255,255,255,0.8)'">
                    💊 Health Advice
                </a>
            </div>

            <!-- Auth -->
            <div style="display:flex; align-items:center; gap:8px;
            flex-shrink:0;">
                <!-- Guest -->
                <div id="guestNav" class="d-flex gap-2">
                    <a href="login.html"
                    style="color:white; font-size:13px;
                    text-decoration:none;
                    border:1.5px solid rgba(255,255,255,0.4);
                    padding:6px 14px; border-radius:20px;
                    transition:all 0.2s;"
                    onmouseover="this.style.background='rgba(255,255,255,0.1)'"
                    onmouseout="this.style.background='transparent'">
                        Log In
                    </a>
                    <a href="login.html"
                    style="color:#0F2044; font-size:13px;
                    text-decoration:none; background:white;
                    padding:6px 14px; border-radius:20px;
                    font-weight:600; transition:all 0.2s;"
                    onmouseover="this.style.background='#E0E7FF'"
                    onmouseout="this.style.background='white'">
                        Sign Up
                    </a>
                </div>
                <!-- User -->
                <div id="userNav" style="display:none;
                align-items:center; gap:8px;">
                    <span id="navUsername"
                    style="color:white; font-size:13px;
                    font-weight:500;"></span>
                    <button onclick="handleLogout()"
                    style="color:white; font-size:12px;
                    background:rgba(255,255,255,0.12);
                    border:none; padding:6px 14px;
                    border-radius:20px; cursor:pointer;
                    transition:all 0.2s;"
                    onmouseover="this.style.background='rgba(255,255,255,0.22)'"
                    onmouseout="this.style.background='rgba(255,255,255,0.12)'">
                        Logout
                    </button>
                </div>

                <!-- Mobile Menu Button -->
                <button class="d-md-none"
                onclick="toggleMobileMenu()"
                style="background:rgba(255,255,255,0.12);
                border:none; color:white; padding:6px 12px;
                border-radius:8px; font-size:18px; cursor:pointer;">
                    ☰
                </button>
            </div>
        </div>

        <!-- Mobile Dropdown Menu -->
        <div id="mobileMenu" style="display:none;
        border-top:1px solid rgba(255,255,255,0.1);
        padding:12px 0;">
            <a href="index.html"
            style="display:block; color:rgba(255,255,255,0.85);
            text-decoration:none; padding:10px 4px; font-size:15px;
            font-weight:500;">
                📊 Risk Assessment
            </a>
            <a href="triage.html"
            style="display:block; color:rgba(255,255,255,0.85);
            text-decoration:none; padding:10px 4px; font-size:15px;
            font-weight:500;">
                🩺 Symptom Checker
            </a>
            <a href="recommendations.html"
            style="display:block; color:rgba(255,255,255,0.85);
            text-decoration:none; padding:10px 4px; font-size:15px;
            font-weight:500;">
                💊 Health Advice
            </a>
        </div>
    </div>
</nav>

    <div class="auth-card">

        <!-- Brand -->
        <div class="brand">
            <h1>❤️ CardioPredict AI</h1>
            <p>Sign in to your account</p>
        </div>

        <!-- Alert Box -->
        <div class="alert-box" id="alertBox"></div>

        <!-- Login Form -->
        <div id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="loginEmail"
                       placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="loginPassword"
                       placeholder="Enter your password">
            </div>
            <button class="btn-login" onclick="handleLogin()">
                Sign In
            </button>
            <div class="divider">or</div>
            <button class="btn-register" onclick="showRegister()">
                Create New Account
            </button>
        </div>

        <!-- Register Form -->
        <div id="registerForm" style="display:none;">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="regName"
                       placeholder="Your full name">
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="regEmail"
                       placeholder="you@example.com">
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="regPassword"
                       placeholder="At least 6 characters">
            </div>
            <button class="btn-login" onclick="handleRegister()">
                Create Account
            </button>
            <div class="divider">or</div>
            <button class="btn-register" onclick="showLogin()">
                Already have an account? Sign In
            </button>
        </div>

        <!-- Back to Home -->
        <p style="text-align:center; margin-top:20px; font-size:13px; color:#94A3B8;">
            <a href="index.html" style="color:#1a56db; text-decoration:none;">
                ← Back to Home
            </a>
        </p>

    </div>

<script>
    function showAlert(message, type) {
        const box = document.getElementById('alertBox');
        box.className = `alert-box ${type === 'error' ? 'alert-error' : 'alert-success'}`;
        box.textContent = message;
        box.style.display = 'block';
    }

    function showRegister() {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('alertBox').style.display = 'none';
    }

    function showLogin() {
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('alertBox').style.display = 'none';
    }

    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showAlert('Please fill in all fields', 'error');
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:5000/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const result = await response.json();

            if (response.ok) {
                // Save user info to localStorage
                localStorage.setItem('user', JSON.stringify(result.user));
                showAlert('Login successful! Redirecting...', 'success');
                setTimeout(() => {
                    window.location.href = 'home.html';
                }, 1000);
            } else {
                showAlert(result.error || 'Login failed', 'error');
            }
        } catch (error) {
    showAlert('Invalid email or password. Please try again.', 'error');
}
    }

    async function handleRegister() {
        const full_name = document.getElementById('regName').value;
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;

        if (!full_name || !email || !password) {
            showAlert('Please fill in all fields', 'error');
            return;
        }

        if (password.length < 6) {
            showAlert('Password must be at least 6 characters', 'error');
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:5000/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ full_name, email, password })
            });

            const result = await response.json();

            if (response.ok) {
                showAlert('Account created! Please sign in.', 'success');
                setTimeout(() => showLogin(), 1500);
            } else {
                showAlert(result.error || 'Registration failed', 'error');
            }
        } catch (error) {
    showAlert('Registration failed. Please try again.', 'error');
}
    }

    // Check if already logged in
    const user = localStorage.getItem('user');
    if (user) {
    window.location.href = 'home.html';
}

// ── Navbar Auth ──────────────────────────────────────────
function checkAuth() {
    const user = localStorage.getItem('user');
    if (user) {
        const u = JSON.parse(user);
        document.getElementById('guestNav').style.display = 'none';
        document.getElementById('userNav').style.display = 'flex';
        document.getElementById('navUsername').textContent =
            '👤 ' + u.name;
    } else {
        document.getElementById('guestNav').style.display = 'flex';
        document.getElementById('userNav').style.display = 'none';
    }
}

// ── Highlight Active Page ────────────────────────────────
function highlightActivePage() {
    const page = window.location.pathname.split('/').pop();
    const map = {
        'index.html':           'nav-risk',
        'triage.html':          'nav-triage',
        'recommendations.html': 'nav-rec',
    };
    const activeId = map[page];
    if (activeId) {
        const el = document.getElementById(activeId);
        if (el) {
            el.style.background = 'rgba(255,255,255,0.18)';
            el.style.color = 'white';
            el.style.fontWeight = '700';
        }
    }
}

// ── Mobile Menu ──────────────────────────────────────────
function toggleMobileMenu() {
    const menu = document.getElementById('mobileMenu');
    menu.style.display =
        menu.style.display === 'none' ? 'block' : 'none';
}

// ── Logout ───────────────────────────────────────────────
async function handleLogout() {
    try {
        await fetch('http://127.0.0.1:5000/api/logout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        });
    } catch(e) {}
    localStorage.removeItem('user');
    localStorage.removeItem('lastPrediction');
    localStorage.removeItem('userBasicInfo');
    window.location.href = 'login.html';
}

checkAuth();
highlightActivePage();
</script>

</body>
</html>
